services:
  - type: web
    name: guardian-benefits-hub-v1-web
    runtime: static
    autoDeploy: true
    buildCommand: cd apps/web && npm install && npm run build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://guardian-benefits-hub-v1-api.onrender.com

  - type: web
    name: guardian-benefits-hub-v1-api
    env: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./apps/api/Dockerfile
    envVars:
      - key: ENV
        value: production
      - key: WEB_ORIGIN
        value: https://guardian-benefits-hub-v1-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-benefits-hub-v1-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: guardian-benefits-hub-v1-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: BOOTSTRAP_SUPER_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_SUPER_ADMIN_PASSWORD
        sync: false
      # SFTP creds needed for manual import trigger from the UI
      - key: SFTP_HOST
        sync: false
      - key: SFTP_USER
        sync: false
      - key: SFTP_PASSWORD
        sync: false
      - key: SFTP_REMOTE_DIR
        sync: false
      - key: SFTP_FILE_PATTERN
        sync: false

  - type: worker
    name: guardian-benefits-hub-v1-worker
    env: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./apps/api/Dockerfile
    dockerCommand: python -m app.worker
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-benefits-hub-v1-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: guardian-benefits-hub-v1-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: BOOTSTRAP_SUPER_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_SUPER_ADMIN_PASSWORD
        sync: false
      # UNL SFTP credentials — set in Render dashboard, not committed to source
      - key: SFTP_HOST
        sync: false
      - key: SFTP_USER
        sync: false
      - key: SFTP_PASSWORD
        sync: false
      - key: SFTP_REMOTE_DIR
        sync: false
      - key: SFTP_FILE_PATTERN
        sync: false
      # Cron schedule (UTC). 11:00 UTC = 7:00 AM ET
      - key: UNL_IMPORT_CRON_HOUR
        value: "11"
      - key: UNL_IMPORT_CRON_MINUTE
        value: "0"

  - type: keyvalue
    name: guardian-benefits-hub-v1-redis
    plan: starter
    ipAllowList: []

databases:
  - name: guardian-benefits-hub-v1-db
    plan: basic-256mb
    diskSizeGB: 5
